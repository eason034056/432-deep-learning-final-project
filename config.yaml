augmentation:
  normalize: true
  rotation_range: 360
  translation_range: 0.0
data:
  normalize_center: true
  normalize_scale: false
  num_channels: 3
  num_points: 500
  processed_dir: data/processed
  raw_dir: data/raw
  samples_per_mesh: 100
device: cuda
logging:
  log_dir: results
  save_best: true
  save_interval: 10
model:
  cnn1d_kernel_size: 3
  dropout: 0.5
  dropout_sa: 0.5
  num_classes: 10
  type: pointnet  # Options: mlp, cnn1d, pointnet
autoencoder:
  common:
    num_channels: 3
  mlp:
    latent_dim: 128
    hidden_dims: [256, 128]
    dropout: 0.5
  pointnet:
    latent_dim: 128
    channel_dims: [64, 128, 256]
    decoder_dims: [512, 256, 128]
    dropout: 0.5
    use_tnet: false
  train:
    batch_size: 64
    learning_rate: 0.001
    weight_decay: 0.001
    num_epochs: 120
    augment: true
    early_stopping:
      enabled: true
      patience: 20
      min_delta: 0.0
  eval:
    batch_size: 64
    num_samples: 4
split:
  seed: 1
  test_ratio: 0.2
  train_ratio: 0.7
  val_ratio: 0.1
training:
  batch_size: 64
  early_stopping_patience: 20
  learning_rate: 0.001
  num_epochs: 120
  weight_decay: 0.001
